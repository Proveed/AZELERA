    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Tu configuración que me pasaste
        const firebaseConfig = {
            apiKey: "AIzaSyD3-C7guJHkmZuwv-TgXNh0XwlYfTSei2k",
            authDomain: "navi-9aa8e.firebaseapp.com",
            projectId: "navi-9aa8e",
            storageBucket: "navi-9aa8e.firebasestorage.app",
            messagingSenderId: "324234630620",
            appId: "1:324234630620:web:0a7353de37ac04fabd6b19"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Función para enviar anuncios desde la web (Opcional)
        window.enviarAnuncio = (texto) => {
            set(ref(db, 'anuncio_actual'), {
                mensaje: texto,
                fecha: Date.now()
            }).then(() => alert("¡Anuncio actualizado en las pantallas!"));
        };
    </script>
