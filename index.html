<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>AZELERA TV - LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-black text-white h-screen w-screen flex overflow-hidden">
    
    <div class="w-2/3 h-full relative" id="media-zone">
        <!-- El contenido cambia aquí -->
    </div>

    <div class="w-1/3 h-full bg-[#020617] flex flex-col items-center justify-center p-10 border-l border-white/5">
        <div id="qrcode" class="p-4 bg-white rounded-2xl mb-8"></div>
        <h2 id="txt-display" class="text-5xl font-black text-center uppercase tracking-tighter"></h2>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const config = { databaseURL: "https://navi-9aa8e-default-rtdb.firebaseio.com" };
        const db = getDatabase(initializeApp(config));
        const qr = new QRCode(document.getElementById("qrcode"), { width: 280, height: 280 });
        
        let anuncios = [];
        let indice = 0;

        onValue(ref(db, 'carrusel'), (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            
            const ahora = Date.now();
            // Filtrar solo anuncios que no han vencido
            anuncios = Object.values(data).filter(a => a.vence > ahora);
            if(anuncios.length > 0) mostrarSiguiente();
        });

        function mostrarSiguiente() {
            if (anuncios.length === 0) return;
            const ad = anuncios[indice];
            
            const zone = document.getElementById('media-zone');
            document.getElementById('txt-display').innerText = ad.texto;
            
            qr.clear();
            qr.makeCode(ad.link || "https://azelera.com");

            if(ad.tipo === 'video') {
                zone.innerHTML = `<video src="${ad.mediaUrl}" autoplay muted playsinline class="w-full h-full object-cover"></video>`;
                // Cuando el video termina, pasa al siguiente
                zone.querySelector('video').onended = () => { avanzar(); };
            } else {
                zone.innerHTML = `<img src="${ad.mediaUrl}" class="w-full h-full object-cover animate-in fade-in duration-1000">`;
                setTimeout(avanzar, 15000); // Imágenes duran 15 segundos
            }
        }

        function avanzar() {
            indice = (indice + 1) % anuncios.length;
            mostrarSiguiente();
        }

        // Importante: La TV necesita un clic del usuario al iniciar para permitir audio/autoplay
        window.onclick = () => { document.querySelectorAll('video').forEach(v => v.muted = false); };
    </script>
</body>
</html>
