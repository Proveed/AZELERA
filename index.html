<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AZELERA ADS - TERMINAL TV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: black; margin: 0; overflow: hidden; font-family: sans-serif; }
        #pantalla { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; transition: all 1s ease-in-out; }
        
        /* EFECTOS DE FONDO QUE EL PANEL MANDA */
        .bg-degradado { background-size: 400% 400%; animation: gradient 15s ease infinite; background-image: linear-gradient(-45deg, #0f172a, #1e3a8a, #020617, #1e40af); }
        @keyframes gradient { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        
        .bg-malla { background-image: radial-gradient(#ffffff1a 1px, transparent 1px); background-size: 40px 40px; }
        .bg-solido { background-image: none; }

        video, img { width: 100%; height: 100%; object-fit: contain; }
        .qr-card { background: white; padding: 15px; border-radius: 2rem; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="init" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center cursor-pointer text-center" onclick="startApp()">
        <div class="w-32 h-32 bg-blue-600 rounded-full animate-bounce flex items-center justify-center text-6xl font-extrabold shadow-2xl shadow-blue-500/50">A</div>
        <h1 class="mt-10 text-2xl font-black text-white uppercase tracking-[0.5em]">Conectar Pantalla</h1>
        <p class="text-blue-400 mt-4 animate-pulse">Toca aquí para iniciar el carrusel de Atacames</p>
    </div>

    <div id="pantalla">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const db = getDatabase(initializeApp({ databaseURL: "https://navi-9aa8e-default-rtdb.firebaseio.com" }));
        
        let anuncios = [];
        let indice = 0;
        let timer;

        // 1. ESCUCHAR LA BASE DE DATOS EN TIEMPO REAL
        onValue(ref(db, 'carrusel'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // Filtramos solo los anuncios activos
                anuncios = Object.values(data).filter(a => a.activo !== false);
                console.log("Anuncios actualizados:", anuncios.length);
                if (!timer && anuncios.length > 0) mostrarSiguiente();
            }
        });

        window.startApp = () => {
            document.getElementById('init').style.display = 'none';
            if (anuncios.length > 0) mostrarSiguiente();
        };

        function mostrarSiguiente() {
            if (anuncios.length === 0) return;
            
            const ad = anuncios[indice];
            const p = document.getElementById('pantalla');
            p.innerHTML = ""; // Limpiar pantalla
            
            // APLICAR COMANDOS VISUALES DEL PANEL
            p.style.backgroundColor = ad.color || "#020617";
            p.className = `bg-${ad.textura || 'solido'}`;

            // LÓGICA POR TIPO DE ANUNCIO
            if (ad.tipo === 'video') {
                p.innerHTML = `<video id="vid" autoplay muted playsinline><source src="${ad.media}" type="video/mp4"></video>`;
                const v = document.getElementById('vid');
                v.onended = () => rotar();
                v.onerror = () => setTimeout(rotar, 2000);
            } 
            else if (ad.tipo === 'image') {
                p.innerHTML = `<img src="${ad.media}" class="animate-in fade-in zoom-in duration-1000">`;
                setTimeout(rotar, 15000); // 15 segundos para fotos
            } 
            else {
                // ANUNCIO DE TEXTO (USA TODOS LOS ESTILOS DEL PANEL)
                p.innerHTML = `
                    <div class="text-center p-10 flex flex-col items-center">
                        <h2 class="text-[7vw] ${ad.fuente || 'font-bold'} leading-none mb-10 drop-shadow-2xl">
                            ${ad.media}
                        </h2>
                        <div class="qr-card" id="qrcode"></div>
                        <p class="mt-8 text-xl font-black opacity-40 uppercase tracking-widest">${ad.titulo}</p>
                    </div>
                `;
                new QRCode(document.getElementById("qrcode"), {
                    text: ad.link || "https://wa.me/593",
                    width: 250,
                    height: 250
                });
                setTimeout(rotar, 12000); // 12 segundos para texto
            }
        }

        function rotar() {
            indice = (indice + 1) % anuncios.length;
            mostrarSiguiente();
        }
    </script>
</body>
</html>
