<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZELERA ADS - PANTALLA EN VIVO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .bg-grid { background-image: radial-gradient(circle, #1e293b 1px, transparent 1px); background-size: 50px 50px; }
    </style>
</head>
<body class="bg-[#020617] text-white overflow-hidden h-screen w-screen flex flex-col justify-between p-12 bg-grid">

    <!-- Header Premium -->
    <div class="flex justify-between items-center border-b border-white/10 pb-8">
        <div class="flex items-center gap-6">
            <div class="bg-blue-600 w-20 h-20 rounded-3xl flex items-center justify-center shadow-2xl shadow-blue-500/40">
                <span class="text-5xl font-black italic">A</span>
            </div>
            <div>
                <h1 class="text-6xl font-black tracking-tighter">AZELERA <span class="text-blue-500">ADS</span></h1>
                <p class="text-blue-400 font-bold tracking-[0.5em] text-sm uppercase">Smart Advertising System</p>
            </div>
        </div>
        <div class="text-right">
            <p id="reloj" class="text-5xl font-mono font-bold text-slate-300">00:00:00</p>
            <p class="text-slate-500 font-bold tracking-widest text-lg uppercase mt-2">Atacames, Ecuador</p>
        </div>
    </div>

    <!-- CONTENIDO CENTRAL (ANUNCIO) -->
    <div class="flex-1 flex items-center justify-center text-center px-10">
        <h2 id="textoAnuncio" class="text-[9rem] font-black leading-[0.85] tracking-tight animate-pulse-slow uppercase drop-shadow-2xl">
            ESPERANDO ANUNCIO...
        </h2>
    </div>

    <!-- Footer de Estado -->
    <div class="bg-blue-600/5 border border-white/10 p-8 rounded-[3rem] flex justify-between items-center backdrop-blur-xl">
        <div class="flex flex-col">
            <span class="text-slate-500 font-bold uppercase tracking-widest text-sm">Estado del Sistema</span>
            <div class="flex gap-4 items-center mt-1">
                <div class="w-4 h-4 bg-green-500 rounded-full animate-ping"></div>
                <span class="text-green-500 font-black text-2xl uppercase">En Línea</span>
            </div>
        </div>
        <div class="text-right">
            <p class="text-slate-400 font-medium italic text-xl">Sincronizado con Base de Datos Realtime</p>
        </div>
    </div>

    <!-- Lógica de Conexión Total -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURACIÓN EXACTA PARA NAVI-9AA8E
        const firebaseConfig = {
            apiKey: "AIzaSyD3-C7guJHkmZuwv-TgXNh0XwlYfTSei2k",
            authDomain: "navi-9aa8e.firebaseapp.com",
            projectId: "navi-9aa8e",
            databaseURL: "https://navi-9aa8e-default-rtdb.firebaseio.com",
            appId: "1:324234630620:web:0a7353de37ac04fabd6b19"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ESCUCHADOR EN TIEMPO REAL (Misma ruta que el panel)
        const anuncioRef = ref(db, 'anuncio_actual');
        
        onValue(anuncioRef, (snapshot) => {
            const data = snapshot.val();
            if (data && data.mensaje) {
                console.log("Nuevo anuncio recibido:", data.mensaje);
                document.getElementById('textoAnuncio').innerText = data.mensaje;
            }
        });

        // Reloj en vivo
        setInterval(() => {
            const ahora = new Date();
            document.getElementById('reloj').innerText = ahora.toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
