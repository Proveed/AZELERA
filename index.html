<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZELERA PREMIUM DISPLAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;800&family=Oswald:wght@500;700&family=Playfair+Display:wght@700;900&display=swap');
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: black; color: white; }
        
        /* Contenedor principal de Media */
        #media-container { position: absolute; inset: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 1; }
        .media-content { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 0 50px rgba(0,0,0,0.8); }

        /* Superposición de Texto Premium (Glassmorphism) */
        #text-overlay { 
            position: absolute; bottom: 5%; left: 5%; right: 5%; z-index: 10;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px;
            padding: 40px 60px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); transform: translateY(20px); opacity: 0; transition: all 1s ease-out;
        }
        #text-overlay.show { transform: translateY(0); opacity: 1; }

        /* Título y Subtítulo Resaltados */
        #ad-titulo { font-weight: 900; text-transform: uppercase; letter-spacing: -2px; line-height: 1; margin: 0; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #ad-subtitulo { font-weight: 500; margin: 10px 0 0 0; opacity: 0.9; text-shadow: 0 2px 5px rgba(0,0,0,0.3); }

        /* QR Flotante */
        .qr-tv-container { background: white; padding: 15px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); flex-shrink: 0; margin-left: 40px; }
        
        /* Tipografías Premium */
        .font-moderno { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 70px; }
        .font-impacto { font-family: 'Oswald', sans-serif; font-size: 85px; }
        .font-elegante { font-family: 'Playfair Display', serif; font-size: 75px; font-style: italic; }
        .sub-moderno { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 32px; }
        .sub-impacto { font-family: 'Oswald', sans-serif; font-size: 36px; }
        .sub-elegante { font-family: 'Playfair Display', serif; font-size: 34px; }

        /* FONDOS ESPECTACULARES */
        #bg-overlay { position: absolute; inset: 0; z-index: 0; transition: all 1s ease; }
        .bg-cosmico { background: radial-gradient(circle at top right, #1e293b 0%, #0f172a 40%, #020617 100%); }
        .bg-aurora { background: linear-gradient(217deg, rgba(10,100,80,.8), rgba(10,100,80,0) 70.71%), linear-gradient(127deg, rgba(20,50,120,.8), rgba(20,50,120,0) 70.71%), linear-gradient(336deg, rgba(10,20,50,.8), rgba(10,20,50,0) 70.71%); }
        .bg-nebulosa { background: radial-gradient(circle at 50% 50%, rgba(150, 50, 150, 0.3), rgba(50, 0, 50, 0.7) 50%, rgba(10, 0, 10, 1) 100%); }
        .bg-minimal { background: #1a1a1a; }
    </style>
</head>
<body>

    <div id="bg-overlay" class="bg-cosmico"></div>

    <div id="media-container">
        </div>

    <div id="text-overlay">
        <div class="flex-1 truncate">
            <h1 id="ad-titulo" class="font-moderno">TÍTULO ANUNCIO</h1>
            <p id="ad-subtitulo" class="sub-moderno">Subtítulo Resaltado</p>
        </div>
        <div class="qr-tv-container">
            <div id="qrcode-tv"></div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE
        const supabaseUrl = 'https://TU_PROYECTO.supabase.co';
        const supabaseKey = 'TU_API_KEY_PUBLISHABLE';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let ads = [];
        let currentIndex = 0;
        let qrTv;
        let videoEnded = false;

        // INICIALIZAR QR TV
        window.addEventListener('load', () => {
            qrTv = new QRCode(document.getElementById("qrcode-tv"), {
                text: "https://azelera.com",
                width: 180, height: 180, colorDark : "#0f172a", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H
            });
            iniciarCiclo();
        });

        async function iniciarCiclo() {
            await cargarAnuncios();
            if (ads.length > 0) { showAd(); }
            else { document.getElementById('media-container').innerHTML = "<h1 style='font-size:40px; color:gray;'>Esperando Anuncios...</h1>"; setTimeout(iniciarCiclo, 5000); }
        }

        async function cargarAnuncios() {
            const { data } = await _supabase.from('anuncios').select('*').eq('activo', true);
            if (data) ads = data;
        }

        function showAd() {
            if (currentIndex >= ads.length) currentIndex = 0;
            const ad = ads[currentIndex];
            const mediaCont = document.getElementById('media-container');
            const overlay = document.getElementById('text-overlay');
            const tit = document.getElementById('ad-titulo');
            const sub = document.getElementById('ad-subtitulo');
            const bg = document.getElementById('bg-overlay');
            
            // Ocultar overlay para transición
            overlay.classList.remove('show');

            // 1. Configurar Fondo
            bg.className = ad.fondo || 'bg-cosmico';

            // 2. Configurar Textos, Colores y Fuentes
            tit.innerText = ad.titulo;
            tit.style.color = ad.color; // El color elegido resalta el Título
            tit.className = ad.fuente || 'font-moderno';

            sub.innerText = ad.subtitulo || "";
            sub.style.color = ad.color; // Y el Subtítulo
            sub.className = (ad.fuente ? ad.fuente.replace('font-', 'sub-') : 'sub-moderno');

            // 3. Configurar QR
            qrTv.makeCode(ad.link || "https://wa.me/593");

            // 4. Cargar Media (Video o Imagen)
            mediaCont.innerHTML = ""; // Limpiar
            let displayTime = 10000; // 10s por defecto para imagen

            if (ad.tipo === 'video') {
                const video = document.createElement('video');
                video.src = ad.media;
                video.className = "media-content";
                video.autoplay = true;
                video.muted = false; // ¡IMPORTANTE! El audio sonará si el usuario interactuó una vez con la TV.
                video.controls = false;
                
                video.onloadedmetadata = function() {
                    displayTime = video.duration * 1000; // El tiempo es la duración del video
                    // Mostrar textos justo después de cargar
                    setTimeout(() => overlay.classList.add('show'), 500);
                };
                
                video.onended = function() { nextAd(); }; // Siguiente al terminar video
                mediaCont.appendChild(video);
                
                // Intento forzado de play con audio (algunos navegadores lo bloquean)
                video.play().catch(e => {
                    console.log("Audio bloqueado por navegador. Muteando para reproducir.");
                    video.muted = true;
                    video.play();
                });

            } else {
                const img = document.createElement('img');
                img.src = ad.media;
                img.className = "media-content";
                mediaCont.appendChild(img);
                // Mostrar textos justo después de cargar
                setTimeout(() => overlay.classList.add('show'), 500);
                // Siguiente después del tiempo fijo
                setTimeout(nextAd, displayTime);
            }
            
            currentIndex++;
        }

        function nextAd() {
            // Antes de pasar al siguiente, recargamos la lista por si hubo ediciones
            cargarAnuncios().then(showAd);
        }

    </script>
</body>
</html>
