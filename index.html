<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZELERA TV - RESPONSIVE SPLIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Bebas+Neue&family=Playfair+Display:ital,wght@1,900&display=swap');
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: white; }
        
        .main-container { display: flex; width: 100vw; height: 100vh; flex-direction: row; }
        
        /* LADO IZQUIERDO: MEDIA */
        #media-panel { width: 65%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .media-content { width: 100%; height: 100%; object-fit: cover; }

        /* LADO DERECHO: INFO (RESPONSIVO) */
        #info-panel { 
            width: 35%; height: 100%; 
            display: flex; flex-direction: column; 
            justify-content: space-between; /* Distribuye espacio arriba y abajo */
            align-items: center; 
            padding: 5% 2%; /* Padding basado en porcentaje para TV */
            box-sizing: border-box; 
            transition: background 1s ease;
            text-align: center;
        }

        /* AJUSTE DE TEXTO PARA QUE NO SE CORTE */
        .text-container { width: 100%; word-wrap: break-word; }
        #ad-titulo { font-size: clamp(2rem, 4vw, 5rem); line-height: 1.1; font-weight: 800; margin-bottom: 1rem; }
        #ad-subtitulo { font-size: clamp(1rem, 1.8vw, 2.5rem); font-weight: 500; opacity: 0.9; }

        /* QR AJUSTADO */
        .qr-wrapper { 
            background: white; 
            padding: 1.5vw; 
            border-radius: 2vw; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
            max-width: 90%;
        }
        canvas, img { max-width: 100%; height: auto !important; }

        /* FUENTES */
        .font-moderno { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-impacto { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; }
        .font-elegante { font-family: 'Playfair Display', serif; font-style: italic; }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="media-panel">
            <div id="media-container" class="w-full h-full"></div>
        </div>

        <div id="info-panel">
            <div class="text-container">
                <h1 id="ad-titulo" class="font-moderno">TÍTULO</h1>
                <p id="ad-subtitulo">Subtítulo Informativo</p>
            </div>
            
            <div class="qr-wrapper">
                <div id="qrcode-tv"></div>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://vasfdurinslsoprkvusm.supabase.co';
        const supabaseKey = 'sb_publishable_KpDcdMU8_qJaeztUIhTxFg_DRvLUOQk';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let ads = [];
        let currentIndex = 0;
        let qrTv;

        window.addEventListener('load', () => {
            // Tamaño dinámico del QR basado en el ancho de la pantalla
            const qrSize = window.innerWidth * 0.22; 
            qrTv = new QRCode(document.getElementById("qrcode-tv"), {
                text: "https://azelera.com",
                width: qrSize, height: qrSize, colorDark : "#000", colorLight : "#fff"
            });
            iniciar();
        });

        async function iniciar() {
            const { data } = await _supabase.from('anuncios').select('*').eq('activo', true).order('id', { ascending: false });
            if (data && data.length > 0) {
                ads = data;
                render();
            } else { setTimeout(iniciar, 5000); }
        }

        function render() {
            if (currentIndex >= ads.length) currentIndex = 0;
            const ad = ads[currentIndex];

            const info = document.getElementById('info-panel');
            const tit = document.getElementById('ad-titulo');
            const sub = document.getElementById('ad-subtitulo');
            const mediaCont = document.getElementById('media-container');

            info.style.backgroundColor = ad.bg_color || '#1e3a8a';
            tit.innerText = ad.titulo;
            sub.innerText = ad.subtitulo || "";
            tit.style.color = ad.color || '#fff';
            sub.style.color = ad.color || '#fff';
            tit.className = 'font-' + (ad.font_family || 'moderno');

            qrTv.makeCode(ad.link || "https://azelera.com");

            mediaCont.innerHTML = "";
            if (ad.tipo === 'video') {
                const v = document.createElement('video');
                v.src = ad.media; v.className = "media-content"; v.autoplay = true; v.muted = false;
                v.onended = () => { currentIndex++; iniciar(); };
                mediaCont.appendChild(v);
                v.play().catch(() => { v.muted = true; v.play(); });
            } else {
                const i = document.createElement('img');
                i.src = ad.media; i.className = "media-content";
                mediaCont.appendChild(i);
                setTimeout(() => { currentIndex++; iniciar(); }, 12000);
            }
        }
    </script>
</body>
</html>
