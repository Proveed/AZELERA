<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AZELERA PREMIUM TV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #000; margin: 0; overflow: hidden; color: white; font-family: sans-serif; }
        #pantalla { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: space-between; transition: 1s ease; }
        .bg-degradado { background-size: 400% 400%; animation: moveGradient 15s ease infinite; }
        @keyframes moveGradient { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        .mensaje-main { font-size: clamp(2.5rem, 6vw, 6.5rem); line-height: 0.85; font-weight: 900; text-transform: uppercase; text-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .mensaje-sub { font-size: clamp(1.2rem, 2.5vw, 2.8rem); margin-top: 2rem; font-weight: 400; opacity: 0.9; max-width: 90%; line-height: 1.2; }
        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.15); padding: 60px; border-radius: 5rem; box-shadow: 0 40px 100px rgba(0,0,0,0.6); }
    </style>
</head>
<body>
    <div id="init" class="fixed inset-0 bg-black z-50 flex items-center justify-center cursor-pointer" onclick="startApp()">
        <div class="text-blue-500 font-black animate-pulse text-4xl">TOCAR PARA ACTIVAR TV</div>
    </div>
    <div id="pantalla"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://vasfdurinslsoprkvusm.supabase.co';
        const supabaseKey = 'sb_publishable_KpDcdMU8_qJaeztUIhTxFg_DRvLUOQk';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let anuncios = []; let index = 0;

        async function traerAnuncios() {
            const { data } = await _supabase.from('anuncios').select('*').eq('activo', true);
            if (data && data.length > 0) anuncios = data;
        }

        async function startApp() {
            document.getElementById('init').style.display = 'none';
            await traerAnuncios(); render();
        }

        async function render() {
            if (anuncios.length === 0) return setTimeout(startApp, 3000);
            const ad = anuncios[index];
            const p = document.getElementById('pantalla');
            
            // Incrementar vistas en Postgres
            await _supabase.rpc('incrementar_vistas', { ad_id: ad.id });

            p.style.backgroundColor = ad.color;
            p.className = "bg-degradado";
            p.style.backgroundImage = `linear-gradient(-45deg, ${ad.color}, #000, ${ad.color}cc)`;

            if (ad.tipo === 'texto') {
                p.innerHTML = `
                    <div class="flex-1 px-[8%] border-l-[10px] border-white/20 ml-[5%] h-[70vh] flex flex-col justify-center">
                        <p class="text-blue-400 font-black uppercase text-xs tracking-widest mb-4">${ad.titulo}</p>
                        <h2 class="mensaje-main italic">${ad.media}</h2>
                        <div class="mensaje-sub italic">${ad.subtitulo || ""}</div>
                    </div>
                    <div class="flex-1 flex justify-center items-center">
                        <div class="glass-card">
                            <div id="qrcode" class="bg-white p-6 rounded-[3rem]" onclick="registrarClic(${ad.id})"></div>
                        </div>
                    </div>
                `;
                new QRCode(document.getElementById("qrcode"), { text: ad.link, width: 300, height: 300 });
                setTimeout(rotate, 15000);
            } else if (ad.tipo === 'image') {
                p.innerHTML = `<img src="${ad.media}" class="w-full h-full object-contain">`;
                setTimeout(rotate, 15000);
            } else {
                p.innerHTML = `<video id="v" autoplay muted class="w-full h-full object-contain"><source src="${ad.media}"></video>`;
                document.getElementById('v').onended = rotate;
            }
        }

        function rotate() { index = (index + 1) % anuncios.length; if(index === 0) traerAnuncios(); render(); }
    </script>
</body>
</html>
