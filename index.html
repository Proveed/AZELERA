<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>AZELERA TV - FIXED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        video, img { width: 100%; height: 100%; object-fit: cover; }
        .bg-premium { background: radial-gradient(circle at center, #1e3a8a, #020617); }
        /* Animación para asegurar que el contenido aparezca */
        .fade-in { animation: fadeIn 0.8s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .qr-mini canvas, .qr-mini img { width: 140px !important; height: 140px !important; }
    </style>
</head>
<body class="bg-black text-white h-screen w-screen flex overflow-hidden font-sans">

    <div id="setup" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center cursor-pointer" onclick="iniciarConPermisos()">
        <div class="bg-blue-600 w-24 h-24 rounded-full animate-pulse flex items-center justify-center text-5xl font-black shadow-[0_0_50px_rgba(37,99,235,0.5)]">A</div>
        <h1 class="mt-8 text-xl font-bold text-blue-400 uppercase tracking-widest">Activar Pantalla Atacames</h1>
    </div>

    <div id="pantalla" class="w-full h-full flex items-center justify-center transition-all duration-500">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const db = getDatabase(initializeApp({ databaseURL: "https://navi-9aa8e-default-rtdb.firebaseio.com" }));
        let anuncios = [];
        let indice = 0;

        onValue(ref(db, 'carrusel'), (snap) => {
            const data = snap.val();
            if(data) {
                anuncios = Object.values(data).filter(a => a.activo !== false && a.vence > Date.now());
            }
        });

        window.iniciarConPermisos = () => {
            document.getElementById('setup').style.display = 'none';
            if(anuncios.length > 0) mostrarContenido();
        };

        function mostrarContenido() {
            if(anuncios.length === 0) return;
            const ad = anuncios[indice];
            const p = document.getElementById('pantalla');
            p.innerHTML = ""; 
            p.className = "w-full h-full flex items-center justify-center fade-in";

            // Tiempos de duración para imagen/texto (30-60s)
            const duracion = Math.floor(Math.random() * (60000 - 30000 + 1)) + 30000;

            if(ad.tipo === 'video') {
                // SOLUCIÓN PARA VIDEO: Forzamos la carga con 'preload' y 'playsinline'
                p.innerHTML = `
                    <video id="vPlayer" preload="auto" autoplay playsinline class="w-full h-full">
                        <source src="${ad.media}" type="video/mp4">
                        <source src="${ad.media}" type="video/webm">
                        Tu TV no soporta este video.
                    </video>`;
                
                const v = document.getElementById('vPlayer');
                v.muted = false; 
                v.play().catch(() => {
                    v.muted = true; // Si falla con audio, arranca en silencio pero ARRANCA
                    v.play();
                });

                v.onended = siguiente;
                v.onerror = () => { console.error("Error cargando video:", ad.media); setTimeout(siguiente, 2000); };
            } 
            else if(ad.tipo === 'image') {
                // SOLUCIÓN PARA IMAGEN: Forzamos con un elemento Image de JS
                const img = new Image();
                img.src = ad.media;
                img.className = "w-full h-full object-contain p-4 shadow-2xl";
                img.onload = () => {
                    p.appendChild(img);
                    setTimeout(siguiente, duracion);
                };
                img.onerror = () => {
                    p.innerHTML = `<h1 class="text-red-500">Error cargando imagen</h1>`;
                    setTimeout(siguiente, 2000);
                };
            }
            else {
                // ANUNCIO DE TEXTO (Tu diseño elegante)
                p.style.backgroundColor = ad.color;
                p.classList.add('bg-premium');
                p.innerHTML = `
                    <div class="text-center px-10">
                        <h2 class="text-8xl ${ad.fuente} uppercase mb-12 drop-shadow-2xl leading-tight">${ad.media}</h2>
                        <div class="flex flex-col items-center">
                            <div id="qr-mini" class="qr-mini p-4 bg-white rounded-3xl shadow-2xl"></div>
                            <p class="mt-4 font-black opacity-40 uppercase tracking-[0.4em] text-sm">${ad.titulo}</p>
                        </div>
                    </div>`;
                new QRCode(document.getElementById("qr-mini"), { text: ad.link, width: 140, height: 140 });
                setTimeout(siguiente, duracion);
            }
        }

        function siguiente() {
            indice = (indice + 1) % anuncios.length;
            mostrarContenido();
        }
    </script>
</body>
</html>
