<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZELERA TV - Player Unificado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
        #video-container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: absolute; font-family: 'Arial', sans-serif; pointer-events: none; }
        #countdown { top: 5%; right: 5%; background: rgba(0,0,0,0.7); color: white; padding: 15px 25px; border-radius: 10px; font-size: 2rem; border: 2px solid #3b82f6; }
        #skip-button { bottom: 10%; right: 5%; background: white; color: black; padding: 20px 40px; border-radius: 5px; font-size: 1.5rem; font-weight: bold; display: none; border: 4px solid #3b82f6; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="video-container">
    <video id="mainVideo" autoplay>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        Tu navegador no soporta video.
    </video>

    <div id="countdown" class="overlay">Iniciando...</div>
    <div id="skip-button" class="overlay">PRESIONA [OK] PARA ADELANTAR</div>
</div>

<script>
    // CONFIGURACIÓN DEL ANUNCIO (Esto lo enviaría tu Panel Web)
    const adConfig = {
        totalDuration: 15, // Segundos totales
        allowSkipAfter: 5,  // Segundos para que aparezca el botón
        nextContentUrl: "https://azelera.com/promo-final" // A donde va tras el skip
    };

    const video = document.getElementById('mainVideo');
    const countdownEl = document.getElementById('countdown');
    const skipBtn = document.getElementById('skip-button');
    
    let timeLeft = adConfig.totalDuration;
    let canSkip = false;

    // 1. Lógica del Cronómetro
    const timer = setInterval(() => {
        timeLeft--;
        countdownEl.innerText = `El anuncio termina en: ${timeLeft}s`;

        // 2. Mostrar botón de adelantar
        if ((adConfig.totalDuration - timeLeft) >= adConfig.allowSkipAfter) {
            canSkip = true;
            skipBtn.style.display = 'block';
        }

        if (timeLeft <= 0) {
            clearInterval(timer);
            finalizarAnuncio();
        }
    }, 1000);

    // 3. Capturar Control Remoto (Teclas OK / Enter)
    window.addEventListener('keydown', (event) => {
        // En Smart TVs, el botón central suele ser el código 13 (Enter) o 10009 (Samsung Return)
        if (canSkip && (event.keyCode === 13 || event.key === "Enter")) {
            adelantarAnuncio();
        }
    });

    function adelantarAnuncio() {
        console.log("Acción: Usuario adelantó el anuncio");
        video.pause();
        alert("¡Anuncio saltado! Redirigiendo a la oferta de Azelera...");
        // Aquí podrías mostrar un QR gigante
        location.reload(); // Reinicia para ejemplo
    }

    function finalizarAnuncio() {
        console.log("Anuncio terminado naturalmente");
        // Lógica para el siguiente video en la lista
    }

    // Asegurar que el video inicie (algunas TVs bloquean el autoplay)
    window.onload = () => {
        video.play().catch(e => console.log("Esperando interacción del usuario"));
    };
</script>

</body>
</html>
