<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>AZELERA TV TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* TEXTURAS ELEGANTES */
        .tex-degradado { background-image: radial-gradient(circle at top right, rgba(255,255,255,0.1), transparent); }
        .tex-malla { 
            background-image: radial-gradient(#ffffff0a 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .tex-cristal { backdrop-filter: blur(10px); background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        
        /* Animación para el degradado vivo */
        @keyframes flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .bg-vivo { background-size: 200% 200%; animation: flow 10s ease infinite; }
        
        .qr-box canvas, .qr-box img { width: 140px !important; height: 140px !important; }
    </style>
</head>
<body class="bg-black text-white h-screen w-screen flex overflow-hidden">

    <div id="overlay" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center cursor-pointer" onclick="this.style.display='none'; iniciar();">
        <div class="bg-blue-600 w-20 h-20 rounded-2xl animate-bounce flex items-center justify-center shadow-2xl text-4xl font-black italic">A</div>
        <p class="mt-4 text-blue-500 font-bold uppercase tracking-widest text-xs">Sincronizar Canal</p>
    </div>

    <div id="pantalla" class="w-full h-full flex items-center justify-center relative transition-all duration-1000">
        <!-- El contenido se genera aquí -->
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://navi-9aa8e-default-rtdb.firebaseio.com" }));
        
        let anuncios = [];
        let indice = 0;

        onValue(ref(db, 'carrusel'), (snap) => {
            const data = snap.val();
            if(!data) return;
            anuncios = Object.values(data).filter(a => a.activo !== false && a.vence > Date.now());
        });

        window.iniciar = () => { if(anuncios.length > 0) mostrar(); };

        function mostrar() {
            const ad = anuncios[indice];
            const p = document.getElementById('pantalla');
            
            if(ad.tipo === 'texto') {
                // Aplicar Color + Textura
                p.style.backgroundColor = ad.color;
                p.className = `w-full h-full flex flex-col items-center justify-center tex-${ad.textura} ${ad.textura === 'degradado' ? 'bg-vivo' : ''}`;
                
                p.innerHTML = `
                    <div class="max-w-6xl text-center px-10">
                        <h2 class="text-8xl ${ad.fuente} uppercase mb-16 drop-shadow-2xl leading-none">${ad.media}</h2>
                        <div class="flex flex-col items-center">
                            <div id="qr-mini" class="qr-box p-3 bg-white rounded-3xl shadow-2xl border-4 border-white/20"></div>
                            <p class="mt-4 font-black text-xs tracking-[0.5em] opacity-40 uppercase">${ad.titulo}</p>
                        </div>
                    </div>`;
                new QRCode(document.getElementById("qr-mini"), { text: ad.link, width: 140, height: 140 });
                setTimeout(proximo, 12000);
            } 
            else if(ad.tipo === 'video') {
                p.style.backgroundColor = "black";
                p.innerHTML = `<video src="${ad.media}" autoplay playsinline class="w-full h-full object-cover"></video>`;
                const v = p.querySelector('video');
                v.muted = false; v.onended = proximo; v.onerror = proximo;
            } 
            else {
                p.style.backgroundColor = ad.color;
                p.innerHTML = `<img src="${ad.media}" class="w-full h-full object-contain p-6 drop-shadow-2xl">`;
                setTimeout(proximo, 15000);
            }
        }

        function proximo() {
            indice = (indice + 1) % anuncios.length;
            mostrar();
        }
    </script>
</body>
</html>
