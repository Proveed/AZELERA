<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZELERA TV</title>

<style>
:root{
--azul:#0A1F44;
--naranja:#FF7A00;
}

body{
margin:0;
background:#000;
overflow:hidden;
font-family:Arial;
}

/* VIDEO FULL */
video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

/* LOGO */
.logo{
position:absolute;
top:20px;
left:20px;
color:var(--naranja);
font-size:18px;
font-weight:bold;
}

/* CTA */
.cta{
position:absolute;
bottom:30px;
left:30px;
background:var(--naranja);
color:#fff;
padding:14px 20px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

/* TEXTO */
.text{
position:absolute;
bottom:100px;
left:30px;
color:#fff;
font-size:18px;
max-width:400px;
}

/* TIMER */
.timer{
position:absolute;
top:20px;
right:20px;
color:#fff;
font-size:16px;
background:rgba(0,0,0,0.5);
padding:8px 12px;
border-radius:10px;
}

/* BARRA */
.bar{
position:absolute;
bottom:0;
left:0;
height:4px;
background:var(--naranja);
width:0%;
}
</style>
</head>

<body>

<div class="logo">AZELERA</div>

<video id="player" autoplay muted></video>

<div class="text" id="text"></div>

<div class="cta" onclick="go()">VER AHORA</div>

<div class="timer" id="timer"></div>

<div class="bar" id="bar"></div>

<script>

let ads = [
{
video:"video1.mp4",
text:"Estás perdiendo clientes ahora mismo. AZELERA los convierte.",
url:"https://online-store--stratedsclub.replit.app/"
},
{
video:"video2.mp4",
text:"Tu negocio necesita tráfico real. AZELERA lo crea.",
url:"https://online-store--stratedsclub.replit.app/"
}
];

let index = 0;
let duration = 15;

function playAd(){

let ad = ads[index];

let player = document.getElementById("player");
player.src = ad.video;

document.getElementById("text").innerText = ad.text;

let timer = duration;
let progress = 0;

let bar = document.getElementById("bar");
bar.style.width = "0%";

let interval = setInterval(()=>{

timer--;
progress++;

document.getElementById("timer").innerText = timer + "s";

bar.style.width = (progress/duration)*100 + "%";

if(timer <= 0){
clearInterval(interval);

index++;
if(index >= ads.length) index = 0;

playAd();
}

},1000);

}

function go(){
window.open(ads[index].url);
}

playAd();

</script>

</body>
</html>
