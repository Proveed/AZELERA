<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AZELERA TV PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librería para generar el QR automáticamente -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-black text-white overflow-hidden h-screen w-screen flex">
    
    <!-- LADO IZQUIERDO: MEDIA (Imagen o Video) -->
    <div class="w-2/3 h-full bg-slate-900 relative flex items-center justify-center border-r border-white/10">
        <div id="container-media" class="w-full h-full">
            <h1 id="placeholder" class="text-4xl text-slate-700 font-black flex h-full items-center justify-center italic">AZELERA ADS SYSTEM</h1>
        </div>
        <!-- Texto sobrepuesto abajo -->
        <div class="absolute bottom-0 w-full bg-gradient-to-t from-black/90 p-12">
            <h2 id="display-texto" class="text-7xl font-black uppercase tracking-tighter">ESPERANDO CONTENIDO...</h2>
        </div>
    </div>

    <!-- LADO DERECHO: QR Y LLAMADA A LA ACCIÓN -->
    <div class="w-1/3 h-full flex flex-col items-center justify-center p-12 space-y-12 bg-[#020617]">
        <div class="text-center">
            <h3 class="text-blue-500 font-black text-3xl mb-2 italic">¡ESCANEA Y COMPRA!</h3>
            <p class="text-slate-400 font-bold tracking-widest text-sm uppercase">Accede a esta oferta ahora</p>
        </div>

        <!-- El QR se genera aquí -->
        <div id="qrcode" class="p-4 bg-white rounded-3xl shadow-2xl shadow-blue-500/20"></div>

        <div class="bg-blue-600 w-24 h-24 rounded-3xl flex items-center justify-center shadow-2xl">
            <span class="text-5xl font-black italic">A</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const config = { 
            apiKey: "AIzaSyD3-C7guJHkmZuwv-TgXNh0XwlYfTSei2k", 
            authDomain: "navi-9aa8e.firebaseapp.com", 
            projectId: "navi-9aa8e", 
            databaseURL: "https://navi-9aa8e-default-rtdb.firebaseio.com", 
            appId: "1:324234630620:web:0a7353de37ac04fabd6b19" 
        };
        const db = getDatabase(initializeApp(config));
        const qrcodeContainer = document.getElementById("qrcode");
        let qr = new QRCode(qrcodeContainer, { width: 300, height: 300 });

        onValue(ref(db, 'anuncio_actual'), (snap) => {
            const data = snap.val();
            if(!data) return;

            // 1. Actualizar Texto
            document.getElementById('display-texto').innerText = data.texto;

            // 2. Actualizar Media (Imagen o Video con Audio)
            const container = document.getElementById('container-media');
            if(data.tipo === 'video') {
                container.innerHTML = `<video src="${data.mediaUrl}" autoplay loop muted class="w-full h-full object-cover"></video>`;
                // NOTA: Para audio, el usuario debe interactuar una vez con la TV, o puedes quitar el 'muted' si la TV lo permite.
            } else {
                container.innerHTML = `<img src="${data.mediaUrl}" class="w-full h-full object-cover shadow-2xl">`;
            }

            // 3. Generar nuevo QR
            qr.clear();
            qr.makeCode(data.linkCliente || "https://azelera.com");
        });
    </script>
</body>
</html>
