<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZELERA TV PRO</title>

<style>
body{
margin:0;
background:#000;
overflow:hidden;
}

/* VIDEO FULL */
video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

/* LOGO */
.logo{
position:absolute;
top:20px;
left:20px;
color:#FF7A00;
font-size:18px;
font-weight:bold;
}

/* TEXTO */
.text{
position:absolute;
bottom:80px;
left:30px;
color:#fff;
font-size:20px;
max-width:500px;
}

/* QR (OPCIONAL) */
.qr{
position:absolute;
bottom:20px;
right:20px;
background:#fff;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="logo">AZELERA</div>

<video id="player" autoplay muted></video>

<div class="text" id="text"></div>

<script>

// 🔥 AQUI CONFIGURAS TUS ANUNCIOS
let ads = [
{
video:"https://TU-SERVIDOR/video1.mp4",
text:"Impulsa tu negocio con AZELERA",
url:"https://online-store--stratedsclub.replit.app/"
},
{
video:"https://TU-SERVIDOR/video2.mp4",
text:"Más tráfico, más clientes",
url:"https://online-store--stratedsclub.replit.app/"
}
];

let index = 0;

function playAd(){

let ad = ads[index];

let player = document.getElementById("player");
player.src = ad.video;

document.getElementById("text").innerText = ad.text;

// duración automática del video
player.onended = () => {

index++;
if(index >= ads.length) index = 0;

playAd();

};

}

playAd();

</script>

</body>
</html>
