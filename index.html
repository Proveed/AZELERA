<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AZELERA ADS - Pantalla en Vivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        .bg-grid {
            background-image: radial-gradient(circle, #1e293b 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="bg-[#020617] text-white overflow-hidden h-screen w-screen flex flex-col justify-between p-12 bg-grid">

    <!-- Header de la Pantalla -->
    <div class="flex justify-between items-center border-b border-white/10 pb-8">
        <div class="flex items-center gap-4">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                <span class="text-4xl font-black italic">A</span>
            </div>
            <h1 class="text-5xl font-black tracking-tighter">AZELERA <span class="text-blue-500 text-3xl">ADS</span></h1>
        </div>
        <div class="text-right">
            <p id="reloj" class="text-4xl font-mono font-bold text-slate-400">00:00:00</p>
            <p class="text-blue-500 font-bold tracking-widest text-sm uppercase">Atacames Live</p>
        </div>
    </div>

    <!-- CONTENIDO DEL ANUNCIO (CENTRO) -->
    <div class="flex-1 flex items-center justify-center text-center px-10">
        <h2 id="textoAnuncio" class="text-[8rem] font-black leading-[0.9] tracking-tight animate-pulse-slow">
            ESPERANDO ANUNCIO...
        </h2>
    </div>

    <!-- Footer / Barra Inferior -->
    <div class="bg-blue-600/10 border border-white/5 p-6 rounded-[2rem] flex justify-between items-center backdrop-blur-md">
        <p class="text-slate-500 font-bold uppercase tracking-widest text-lg">Publicidad en Tiempo Real</p>
        <div class="flex gap-4 items-center">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-ping"></div>
            <span class="text-green-500 font-bold">SISTEMA ONLINE</span>
        </div>
    </div>

    <!-- Lógica de Firebase para la TV -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3-C7guJHkmZuwv-TgXNh0XwlYfTSei2k",
            authDomain: "navi-9aa8e.firebaseapp.com",
            projectId: "navi-9aa8e",
            storageBucket: "navi-9aa8e.firebasestorage.app",
            messagingSenderId: "324234630620",
            appId: "1:324234630620:web:0a7353de37ac04fabd6b19"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ESCUCHADOR EN TIEMPO REAL
        const anuncioRef = ref(db, 'anuncio_actual');
        onValue(anuncioRef, (snapshot) => {
            const data = snapshot.val();
            if (data && data.mensaje) {
                document.getElementById('textoAnuncio').innerText = data.mensaje.toUpperCase();
            }
        });

        // Reloj para la TV
        setInterval(() => {
            const ahora = new Date();
            document.getElementById('reloj').innerText = ahora.toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
