<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AZELERA PREMIUM TV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #000; margin: 0; overflow: hidden; color: white; font-family: sans-serif; }
        #pantalla { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: space-between; transition: background 1s ease; }
        
        .text-area { flex: 1.2; padding: 0 8%; border-left: 6px solid rgba(255,255,255,0.15); height: 70vh; margin-left: 5%; display: flex; flex-direction: column; justify-content: center; }
        
        .categoria { color: #60a5fa; font-weight: 900; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 0.2em; margin-bottom: 1rem; }
        .mensaje-main { font-size: 5rem; line-height: 0.9; font-weight: 900; text-transform: uppercase; font-style: italic; }
        .mensaje-sub { font-size: 1.8rem; margin-top: 1.5rem; font-weight: 400; opacity: 0.8; line-height: 1.3; max-width: 85%; }
        
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); padding: 50px; border-radius: 4rem; margin-right: 8%; box-shadow: 0 50px 100px rgba(0,0,0,0.5); }
        .qr-container { background: white; padding: 25px; border-radius: 2rem; }
    </style>
</head>
<body>
    <div id="init" class="fixed inset-0 bg-black z-50 flex items-center justify-center cursor-pointer" onclick="startApp()">
        <div class="text-blue-500 font-black animate-pulse text-2xl tracking-[1em]">AZELERA TV</div>
    </div>
    <div id="pantalla"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://vasfdurinslsoprkvusm.supabase.co';
        const supabaseKey = 'sb_publishable_KpDcdMU8_qJaeztUIhTxFg_DRvLUOQk';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let anuncios = []; let index = 0;

        async function startApp() {
            document.getElementById('init').style.display = 'none';
            const { data } = await _supabase.from('anuncios').select('*').eq('activo', true);
            if (data) { anuncios = data; render(); }
        }

        function render() {
            if (anuncios.length === 0) return;
            const ad = anuncios[index];
            const p = document.getElementById('pantalla');
            p.style.backgroundColor = ad.color;

            if (ad.tipo === 'texto') {
                p.innerHTML = `
                    <div class="text-area">
                        <p class="categoria">${ad.titulo}</p>
                        <h2 class="mensaje-main">${ad.media}</h2>
                        <div class="mensaje-sub">${ad.subtitulo || ""}</div>
                    </div>
                    <div class="glass-card">
                        <div id="qrcode" class="qr-container"></div>
                    </div>
                `;
                new QRCode(document.getElementById("qrcode"), { text: ad.link, width: 320, height: 320 });
                setTimeout(rotate, 15000);
            } else if (ad.tipo === 'image') {
                p.innerHTML = `<img src="${ad.media}" class="w-full h-full object-cover">`;
                setTimeout(rotate, 15000);
            } else {
                p.innerHTML = `<video autoplay muted class="w-full h-full object-cover"><source src="${ad.media}"></video>`;
                p.querySelector('video').onended = rotate;
            }
        }

        function rotate() { index = (index + 1) % anuncios.length; render(); }
    </script>
</body>
</html>
